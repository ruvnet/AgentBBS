<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>late.sh — YouTube</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
      #player { width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script>
      const STATE_NAMES = {
        "-1": "unstarted",
        "0":  "ended",
        "1":  "playing",
        "2":  "paused",
        "3":  "buffering",
        "5":  "cued"
      };

      // Single source of truth for everything driven by the Rust side.
      const state = {
        apiLoading: false,
        apiReady:   false,
        player:     null,
        playerReady: false,
        currentItem: null,   // { itemId, videoId, isStream, startSeconds }
        pendingItem: null,   // queued while api/player loads
        currentItemStarted: false,
        autoplayBlocked: false,
        userMuted: false,
        volumePercent: 100,
        sourceMode: null,    // "icecast" | "youtube" | null
      };

      function send(payload) {
        try { window.ipc.postMessage(JSON.stringify(payload)); }
        catch (err) { console.error("ipc post failed", err); }
      }

      function setStatus(text) {
        document.title = "late.sh YouTube: " + text;
      }

      function loadYoutubeApi() {
        if (state.apiReady || state.apiLoading) return;
        state.apiLoading = true;
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        tag.onerror = function () {
          state.apiLoading = false;
          send({ type: "api_load_failed" });
          setStatus("iframe api failed");
        };
        document.head.appendChild(tag);
      }

      function ensurePlayer() {
        if (state.player) return;
        if (!window.YT || !window.YT.Player) { loadYoutubeApi(); return; }
        state.player = new window.YT.Player("player", {
          playerVars: {
            controls: 0,
            enablejsapi: 1,
            origin: window.location.origin,
            playsinline: 1,
            rel: 0
          },
          events: {
            onReady: function () {
              state.playerReady = true;
              applyAudioSettings();
              if (state.pendingItem) playItem(state.pendingItem);
            },
            onStateChange: function (event) {
              const label = STATE_NAMES[String(event.data)] || "unknown";
              let positionMs = 0, durationMs = null;
              try { positionMs = Math.floor((state.player.getCurrentTime() || 0) * 1000); } catch (e) {}
              try {
                const d = state.player.getDuration();
                if (Number.isFinite(d) && d > 0) durationMs = Math.floor(d * 1000);
              } catch (e) {}
              if (label === "playing") {
                state.autoplayBlocked = false;
                state.currentItemStarted = true;
                applyAudioSettings();
              }
              setStatus(label);
              if (shouldReportPlayerState(label)) {
                send({
                  type: "state",
                  item_id: state.currentItem ? state.currentItem.itemId : null,
                  state: label,
                  position_ms: positionMs,
                  duration_ms: durationMs,
                  autoplay_blocked: state.autoplayBlocked
                });
              }
            },
            onError: function (event) {
              const code = String(event.data || "unknown");
              setStatus("error " + code);
              send({
                type: "error",
                item_id: state.currentItem ? state.currentItem.itemId : null,
                video_id: state.currentItem ? state.currentItem.videoId : null,
                code: code
              });
            }
          }
        });
      }

      function isSameItem(a, b) {
        return !!a && !!b && a.itemId === b.itemId && a.videoId === b.videoId;
      }

      function loadedVideoId() {
        if (!state.player || !state.player.getVideoData) return null;
        try { return state.player.getVideoData().video_id || null; } catch (e) { return null; }
      }

      // Whether the player is actually playing/buffering right now. After a
      // mute stopVideo() the player still reports its old video_id, so this is
      // how we tell "same video already running" (a heartbeat to ignore) apart
      // from "same video but stopped" (an unmute resume we must reload + seek).
      function playerIsActive() {
        if (!state.player || !state.player.getPlayerState) return false;
        try {
          const ps = state.player.getPlayerState();
          return ps === 1 || ps === 3; // playing or buffering
        } catch (e) { return false; }
      }

      // Stop the stream while muted so nothing downloads in the background. The
      // current item stays held; unmuting resumes it (the server re-sends
      // load_video seeked to the live position).
      function pauseForMute() {
        if (state.player && state.player.stopVideo) {
          try { state.player.stopVideo(); } catch (e) {}
        }
        setStatus("muted");
      }

      function applyAudioSettings() {
        if (!state.player) return;
        try {
          if (state.player.setVolume) state.player.setVolume(state.volumePercent);
        } catch (e) {}
        try {
          if (state.userMuted || state.volumePercent === 0) state.player.mute();
          else state.player.unMute();
        } catch (e) {}
      }

      function shouldReportPlayerState(label) {
        if (label === "unstarted" || label === "cued" || label === "unknown") {
          return false;
        }
        if (label !== "ended") {
          return true;
        }
        if (state.currentItemStarted) {
          return true;
        }
        return false;
      }

      function playItem(item) {
        if (!state.player || !state.playerReady || !state.player.loadVideoById) return;
        const switching = state.currentItem && !isSameItem(state.currentItem, item);
        if (switching && state.player.stopVideo) state.player.stopVideo();
        // Only treat the video as "already loaded" (resume with a bare
        // playVideo) when it's actually playing. After a mute stopVideo() the
        // player still reports the same video_id but is cued at 0, so a bare
        // playVideo would start from 0 and ignore startSeconds; we must fall
        // through to loadVideoById() to reload and seek to the live position.
        const alreadyLoaded =
          !switching && loadedVideoId() === item.videoId && playerIsActive();
        state.currentItem = item;
        state.pendingItem = null;
        state.currentItemStarted = false;
        state.autoplayBlocked = false;
        // While muted, hold the item but don't download or play. Also avoids
        // YouTube's loadVideoById briefly un-muting on a track change.
        if (state.userMuted) {
          pauseForMute();
          return;
        }
        applyAudioSettings();
        if (alreadyLoaded && state.player.playVideo) {
          state.player.playVideo();
        } else {
          const request = { videoId: item.videoId };
          if (Number.isFinite(item.startSeconds) && item.startSeconds > 0) {
            request.startSeconds = item.startSeconds;
          }
          state.player.loadVideoById(request);
        }
        detectAutoplayBlocked(item);
      }

      function detectAutoplayBlocked(item) {
        window.setTimeout(function () {
          if (!isSameItem(state.currentItem, item)) return;
          if (!state.player || !state.player.getPlayerState) return;
          const ps = state.player.getPlayerState();
          if (ps === -1 || ps === 2 || ps === 5) {
            try {
              applyAudioSettings();
              state.player.playVideo();
            } catch (e) {}
            window.setTimeout(function () {
              if (!isSameItem(state.currentItem, item)) return;
              const ps2 = state.player.getPlayerState();
              if (ps2 !== 1) {
                state.autoplayBlocked = true;
                setStatus("tap to play");
                send({ type: "autoplay_blocked", item_id: item.itemId });
              }
            }, 1500);
          }
        }, 1500);
      }

      document.body.addEventListener("click", function () {
        state.autoplayBlocked = false;
        applyAudioSettings();
        if (state.player && state.player.playVideo) {
          try { state.player.playVideo(); } catch (e) {}
        }
      });

      // Public bridge — called by Rust via webview.evaluate_script.
      window.lateBridge = {
        loadVideo: function (payload) {
          const item = {
            itemId:  payload.item_id,
            videoId: payload.video_id,
            isStream: !!payload.is_stream,
            startSeconds: null
          };
          const rawStartSeconds = Number(payload.start_seconds);
          if (Number.isFinite(rawStartSeconds) && rawStartSeconds > 0) {
            item.startSeconds = Math.floor(rawStartSeconds);
          }
          if (!item.startSeconds) {
            if (isSameItem(state.pendingItem, item) && state.pendingItem.startSeconds) {
              item.startSeconds = state.pendingItem.startSeconds;
            } else if (isSameItem(state.currentItem, item) && state.currentItem.startSeconds) {
              item.startSeconds = state.currentItem.startSeconds;
            }
          }
          // Heartbeat no-op: same item, same loaded video, still actively
          // playing. Don't restart. The playerIsActive() guard is what lets an
          // unmute resume through: after muting we stopVideo()'d, so the player
          // reports the same video_id but is no longer active, and we fall
          // through to playItem() to reload at the seeked position.
          if (isSameItem(state.currentItem, item) && loadedVideoId() === item.videoId
              && playerIsActive()) {
            return;
          }
          state.pendingItem = item;
          ensurePlayer();
          if (state.playerReady) playItem(item);
        },

        sourceChanged: function (payload) {
          state.sourceMode = payload.audio_mode;
          setStatus("source: " + state.sourceMode);
          if (state.sourceMode === "icecast" && state.player && state.player.pauseVideo) {
            try { state.player.pauseVideo(); } catch (e) {}
          }
          send({ type: "source_ack", audio_mode: state.sourceMode });
        },

        audioSettings: function (payload) {
          const wasMuted = state.userMuted;
          state.userMuted = !!payload.muted;
          const nextVolume = Number(payload.volume_percent);
          if (Number.isFinite(nextVolume)) {
            state.volumePercent = Math.max(0, Math.min(100, Math.round(nextVolume)));
          }
          applyAudioSettings();
          if (state.userMuted) {
            pauseForMute();
            return;
          }
          // Unmuting (muted -> unmuted): the player was stopped, and the server
          // follows this with a load_video seeked to the live position. Calling
          // playVideo() here would start the stopped player from 0 and that
          // seeking load would then be suppressed as a no-op. Let the load_video
          // do the resume; only nudge playback for non-unmute settings changes.
          if (wasMuted) return;
          if (state.player && state.player.playVideo && state.sourceMode === "youtube") {
            try { state.player.playVideo(); } catch (e) {}
          }
        },

        shutdown: function () {
          if (state.player && state.player.stopVideo) {
            try { state.player.stopVideo(); } catch (e) {}
          }
          send({ type: "shutdown_ack" });
        }
      };

      // Called by the YT IFrame API once the script has loaded.
      window.onYouTubeIframeAPIReady = function () {
        state.apiReady = true;
        state.apiLoading = false;
        if (state.pendingItem) ensurePlayer();
      };

      // Optional: kick off API load eagerly so first load_video has less latency.
      loadYoutubeApi();
      send({ type: "ready" });
    </script>
  </body>
</html>
