<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Flat dark background, matching the site's gray-900 -->
  <rect width="1200" height="630" fill="#111827" />

  <!-- Top-left brand mark -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
    <circle cx="74" cy="78" r="5" fill="#22c55e" />
    <text x="90" y="84" fill="#22c55e" font-size="20">late.sh</text>
  </g>

  <!-- Hero: ssh late.sh▌  -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
    <text x="80" y="332" font-size="100" font-weight="600" xml:space="preserve"><tspan fill="#9ca3af">ssh</tspan><tspan fill="#f3f4f6"> late.sh</tspan></text>
    <!-- Cursor block, placed after the text, sized to cap height -->
    <rect x="788" y="252" width="26" height="92" fill="#22c55e" />
  </g>

  <!-- Tagline + sub-tagline -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
    <text x="84" y="402" fill="#6b7280" font-size="28">a cozy terminal clubhouse for terminal people</text>
    <text x="84" y="442" fill="#4b5563" font-size="20">pour a coffee. pull up a chair. stay a while.</text>
  </g>

  <!-- Footer mark, same style as the connect page section markers -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
    <text x="84" y="556" font-size="18" xml:space="preserve"><tspan fill="#374151"># </tspan><tspan fill="#4b5563">open the terminal, you're already home</tspan></text>
  </g>

  <!-- Subtle coffee mug, feather-style, matching the favicon. Tucked to the right, low contrast. -->
  <g transform="translate(960, 380) scale(7)" fill="none" stroke="#166534" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 8h1a4 4 0 0 1 0 8h-1" />
    <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
    <line x1="6" y1="1" x2="6" y2="4" />
    <line x1="10" y1="1" x2="10" y2="4" />
    <line x1="14" y1="1" x2="14" y2="4" />
  </g>
</svg>
