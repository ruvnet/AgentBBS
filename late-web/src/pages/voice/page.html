{% extends "pages/layout.html" %}

{% block page %}
<script
    src="https://cdn.jsdelivr.net/npm/livekit-client@2.19.1/dist/livekit-client.umd.min.js"
    integrity="sha384-YKDo40FcWmYmBbI7M2lt2FrzgeSZOZQtgEzd7u2R1MReHxUr9DNuDcXgFEr05PkM"
    crossorigin="anonymous"></script>

<div id="voice-listen" data-api-url="{{ api_url }}" class="max-w-lg mx-auto pt-8 sm:pt-16">
    <div class="mb-10">
        <h1 class="text-2xl text-green-500 tracking-tight">late voice</h1>
        <p class="text-gray-600 mt-1 text-sm">listen only</p>
    </div>

    <div id="voice-status" class="mb-8 text-sm text-gray-600">
        idle
    </div>

    <div class="space-y-3">
        <button id="voice-start"
            class="w-full text-left border border-gray-700 hover:border-green-900 px-4 py-3 text-sm text-gray-300 hover:text-green-500 bg-gray-900/40 transition-colors duration-200">
            [ start listening ]
        </button>
        <button id="voice-stop"
            class="hidden w-full text-left border border-gray-800 hover:border-gray-600 px-4 py-3 text-sm text-gray-600 hover:text-gray-400 transition-colors duration-200">
            [ disconnect ]
        </button>
    </div>

    <div id="voice-room" class="mt-8 text-xs text-gray-700"></div>
    <div id="voice-audio" class="hidden"></div>
</div>

<script>
(() => {
    const root = document.getElementById('voice-listen');
    const status = document.getElementById('voice-status');
    const start = document.getElementById('voice-start');
    const stop = document.getElementById('voice-stop');
    const roomLabel = document.getElementById('voice-room');
    const audioRoot = document.getElementById('voice-audio');

    let room = null;
    const attachedTracks = new Map();

    function setStatus(text, tone = 'muted') {
        const tones = {
            muted: 'mb-8 text-sm text-gray-600',
            good: 'mb-8 text-sm text-green-500',
            wait: 'mb-8 text-sm text-yellow-500',
            bad: 'mb-8 text-sm text-red-400',
        };
        status.className = tones[tone] || tones.muted;
        status.textContent = text;
    }

    function apiBaseUrl(raw) {
        const value = (raw || '').trim().replace(/\/+$/, '');
        if (value.startsWith('http://') || value.startsWith('https://')) {
            return value;
        }
        const host = value.split('/')[0];
        if (host === 'localhost' || host.startsWith('localhost:') || host === '127.0.0.1' || host.startsWith('127.0.0.1:')) {
            return `http://${value}`;
        }
        return `https://${value}`;
    }

    function trackKey(track) {
        return track.sid || (track.mediaStreamTrack && track.mediaStreamTrack.id) || track;
    }

    function attachTrack(track) {
        if (!window.LivekitClient || track.kind !== window.LivekitClient.Track.Kind.Audio) {
            return;
        }
        const key = trackKey(track);
        if (attachedTracks.has(key)) {
            return;
        }
        const el = track.attach();
        el.autoplay = true;
        attachedTracks.set(key, { track, el });
        audioRoot.appendChild(el);
    }

    function detachTrack(track) {
        const key = trackKey(track);
        const entry = attachedTracks.get(key);
        if (!entry) {
            return;
        }
        if (entry.track && typeof entry.track.detach === 'function') {
            entry.track.detach(entry.el);
        }
        entry.el.remove();
        attachedTracks.delete(key);
    }

    function detachAllTracks() {
        attachedTracks.forEach(({ track, el }) => {
            if (track && typeof track.detach === 'function') {
                track.detach(el);
            }
            el.remove();
        });
        attachedTracks.clear();
        audioRoot.replaceChildren();
    }

    function attachExistingTracks() {
        room.remoteParticipants.forEach((participant) => {
            participant.trackPublications.forEach((publication) => {
                if (publication.track) {
                    attachTrack(publication.track);
                }
            });
        });
    }

    async function disconnect() {
        if (room) {
            room.disconnect();
            room = null;
        }
        detachAllTracks();
        roomLabel.textContent = '';
        start.classList.remove('hidden');
        stop.classList.add('hidden');
        setStatus('disconnected');
    }

    async function listen() {
        if (!window.LivekitClient) {
            setStatus('LiveKit client failed to load', 'bad');
            return;
        }

        start.disabled = true;
        setStatus('connecting...', 'wait');

        try {
            const base = apiBaseUrl(root.dataset.apiUrl);
            const res = await fetch(`${base}/api/voice/listen-ticket`, { cache: 'no-store' });
            if (!res.ok) {
                const error = await res.json().catch(() => ({ message: 'voice unavailable' }));
                throw new Error(error.message || 'voice unavailable');
            }
            const ticket = await res.json();

            room = new window.LivekitClient.Room({ autoSubscribe: true });
            room.on(window.LivekitClient.RoomEvent.TrackSubscribed, (track) => attachTrack(track));
            room.on(window.LivekitClient.RoomEvent.TrackUnsubscribed, (track) => detachTrack(track));
            room.on(window.LivekitClient.RoomEvent.Disconnected, () => {
                detachAllTracks();
                start.classList.remove('hidden');
                stop.classList.add('hidden');
                setStatus('disconnected');
            });

            await room.connect(ticket.url, ticket.token);
            if (typeof room.startAudio === 'function') {
                await room.startAudio();
            }
            attachExistingTracks();

            roomLabel.textContent = `#${ticket.room}`;
            start.classList.add('hidden');
            stop.classList.remove('hidden');
            setStatus('listening', 'good');
        } catch (err) {
            setStatus(err.message || 'failed to connect', 'bad');
        } finally {
            start.disabled = false;
        }
    }

    start.addEventListener('click', listen);
    stop.addEventListener('click', disconnect);
})();
</script>
{% endblock %}
