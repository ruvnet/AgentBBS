# AgentBBS — Tor sidecar: publishes .onion services for the SSH / web /
# federation ports and exposes a SOCKS5 proxy the node uses for anonymous egress.
#
#   docker compose -f docker-compose.tor.yml up -d
#   # read your three onion addresses (same key dir -> same .onion per port):
#   docker exec agentbbs-tor cat /var/lib/tor/agentbbs/hostname
#   # point the node's federation egress through Tor:
#   export AGENTBBS_SOCKS5=127.0.0.1:9050
#
# The AgentBBS services run on the host (see ../README and ../../README for how
# to start `agentbbs ssh`, `agentbbs-web`, and `agentbbs federate serve`). Tor
# reaches them via host.docker.internal.

services:
  tor:
    image: ghcr.io/hectorm/tor:latest
    container_name: agentbbs-tor
    command: ["tor", "-f", "/etc/tor/torrc"]
    volumes:
      - ./torrc:/etc/tor/torrc:ro
      - tor-keys:/var/lib/tor # persists the onion key (stable .onion across restarts)
    ports:
      - "127.0.0.1:9050:9050" # SOCKS5 for AGENTBBS_SOCKS5 (localhost only)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  tor-keys:
