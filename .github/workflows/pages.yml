name: Deploy Genesis Node to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel in-progress runs so a
# running deploy can finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload genesis/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: genesis

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
