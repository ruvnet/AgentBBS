name: agentbbs

# CI for the AgentBBS layer (the agentbbs-* crates) built additively on top of
# the late.sh platform. Self-contained on purpose so it can evolve without
# touching the existing reusable `ci.yml`.

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # The agentbbs crates this layer owns. Kept in one place so every job stays
  # in sync.
  AGENTBBS_PKGS: >-
    -p agentbbs-core
    -p agentbbs-federation
    -p agentbbs-wasm
    -p agentbbs-mcp
    -p agentbbs-arena
    -p agentbbs-gcp
    -p agentbbs-tui
    -p agentbbs
    -p agentbbs-web

jobs:
  fmt-clippy-test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: install_linux_build_dependencies
        # mold is the linker pinned by .cargo/config.toml; install it (plus the
        # native deps the TUI/web/audio crates need) so no RUSTFLAGS override is
        # required, matching the existing ci.yml.
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev pkg-config mold

      - name: install_rust
        run: rustup component add rustfmt clippy

      - name: restore_rust_cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: agentbbs-ci
          cache-targets: false

      - name: cargo_fmt_check
        # rustfmt has no per-package filter; --all matches the existing ci.yml
        # and keeps the agentbbs crates formatted alongside the rest.
        run: cargo fmt --all -- --check

      - name: cargo_clippy
        run: cargo clippy ${{ env.AGENTBBS_PKGS }} --all-targets -- -D warnings

      - name: install_nextest
        uses: taiki-e/install-action@nextest

      - name: cargo_test
        run: cargo nextest run ${{ env.AGENTBBS_PKGS }} --all-targets

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: cargo_deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  gcp-emulators:
    name: gcp reporting (live emulators)
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: install_build_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mold pkg-config

      - name: start_emulators
        # Bring up the Firestore + Pub/Sub emulators the Rust code targets.
        run: |
          docker compose -f agentbbs-gcp/docker-compose.emulators.yml up -d
          # Wait for both emulators to answer.
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null 2>&1 \
              && curl -sf http://localhost:8085/v1/projects/demo-project/topics >/dev/null 2>&1 \
              && break
            sleep 3
          done
          # Create the Pub/Sub topic the publisher expects (emulator starts empty).
          curl -s -X PUT http://localhost:8085/v1/projects/demo-project/topics/agentbbs-events

      - name: restore_rust_cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: agentbbs-ci
          cache-targets: false

      - name: test_against_emulators
        # With the *_EMULATOR_HOST vars set, the runtime-guarded emulator tests
        # (writes_to_emulator / publishes_to_emulator) execute their real
        # read-back / publish assertions instead of skipping.
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          PUBSUB_EMULATOR_HOST: localhost:8085
        run: cargo test -p agentbbs-gcp --all-targets

      - name: stop_emulators
        if: always()
        run: docker compose -f agentbbs-gcp/docker-compose.emulators.yml down
